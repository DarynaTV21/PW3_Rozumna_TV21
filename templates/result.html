<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#283048,#859398);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:40px;
border-radius:12px;
width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

pre{
background:#f4f4f4;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
word-break:break-word;
max-height:400px;
overflow-y:auto;
}

a{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
background:#283048;
color:white;
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="box">

<h2>Результат</h2>

<pre>
{{.}}
</pre>

<a href="/">На головну</a>

</div>

</body>
</html>
